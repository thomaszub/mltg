[project]
name = "eva"
version = "0.1.0"
description = "Exalted Virtual Agent"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "flax==0.12.6",
    "jax[cpu]==0.9.2",
    "optax==0.2.8",
]

[dependency-groups]
dev = [
    "jupyterlab==4.5.6",
    "pytest==9.0.2",
    "ruff==0.15.7",
]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "D", "PLR2004", "S101", "T20"]
