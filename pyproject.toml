[project]
name = "eva"
version = "0.1.0"
description = "Exalted Virtual Agent"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "flax==0.12.1",
    "jax[cpu]==0.8.1",
    "optax==0.2.6",
]

[dependency-groups]
dev = [
    "pytest==9.0.2",
    "ruff==0.14.9",
]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "D", "PLR2004", "S101", "T20"]
