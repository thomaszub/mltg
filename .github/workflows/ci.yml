name: CI

on:
  push:
    branches:
      - "main"
      - "renovate/**"

  pull_request:
    branches:
      - "main"

  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.14

      - name: Setup environment
        run: uv sync
